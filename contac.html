<html lang="es">
<head>
  <meta charset="utf-8">

  <title>Contacto | Practica Incos</title>

  <!-- Bootstrap CSS -->
  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Header/Navigation -->
  <nav class="custom-navbar navbar navbar-expand-md navbar-dark bg-dark" arial-label="Furni navigation bar">
    <div class="container">
      <a class="navbar-brand" href="index.html">Practica Incos<span>.</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsFurni">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarsFurni">
        <ul class="custom-navbar-nav navbar-nav ms-auto mb-2 mb-md-0">
          <li><a class="nav-link" href="index.html">Inicio</a></li>
          <li><a class="nav-link" href="tienda.html">Tienda</a></li>
          <li><a class="nav-link" href="acerca.html">Acerca</a></li>
          <li><a class="nav-link" href="services.html">Servicios</a></li>
          <li><a class="nav-link" href="blog.html">Blog</a></li>
          <li class="active"><a class="nav-link" href="contact.html">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <!-- End Header -->

  <!-- Hero Section -->
  <div class="hero">
    <div class="container text-center">
      <h1 class="mb-4">Contáctanos</h1>
      <p class="lead text-muted">Envíanos tus dudas, sugerencias o comentarios.</p>
    </div>
  </div>

  <!-- Contact Form Section -->
  <section class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card shadow-sm p-4">
          <h3 class="mb-4">Formulario de Contacto</h3>
          <form>
            <div class="mb-3">
              <label for="nombre" class="form-label">Nombre</label>
              <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" id="email" placeholder="tu@email.com" required>
            </div>
            <div class="mb-3">
              <label for="asunto" class="form-label">Asunto</label>
              <input type="text" class="form-control" id="asunto" placeholder="Asunto del mensaje" required>
            </div>
            <div class="mb-3">
              <label for="mensaje" class="form-label">Mensaje</label>
              <textarea class="form-control" id="mensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Enviar</button>
          </form>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer-section bg-dark text-light py-4">
    <div class="container text-center">
      <p class="mb-0">© 2025 Incos. Todos los derechos reservados.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/bootstrap.bundle.min.js"></script>
</body>
</html>
